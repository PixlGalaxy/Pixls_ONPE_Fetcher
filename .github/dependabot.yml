version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/Frontend"
    open-pull-requests-limit: 15
    schedule:
      interval: "daily"
    groups:
      frontend-deps:
        patterns:
          - "*"
          
  - package-ecosystem: "pip"
    directory: "/Backend"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"
    groups:
      backend-python-deps:
        patterns:
          - "*"
